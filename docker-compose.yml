services:
  mongo:
    image: mongo:7
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "6379:6379"
    command: redis-server --maxmemory 256mb --maxmemory-policy allkeys-lru --save ""
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      - GROQ_API_KEY=${GROQ_API_KEY:-}
      - GROQ_BASE_URL=${GROQ_BASE_URL:-https://api.groq.com/openai/v1}
      - LLM_MODEL=${LLM_MODEL:-llama-3.3-70b-versatile}
      - LLM_FALLBACK_MODEL=${LLM_FALLBACK_MODEL:-llama-3.1-8b-instant}
      - MONGO_URI=mongodb://mongo:27017
      - MONGO_DB=${MONGO_DB:-nexora_bot}
      - REDIS_URL=redis://redis:6379
      - TEAM_NAME=${TEAM_NAME:-NEXORA Engine}
      - TEAM_MEMBERS=${TEAM_MEMBERS:-Ujjwal Saini}
      - CONTACT_EMAIL=${CONTACT_EMAIL:-you@example.com}
      - BOT_VERSION=${BOT_VERSION:-1.0.0}
      - SUBMITTED_AT=${SUBMITTED_AT:-2026-06-25T08:00:00Z}
      - ENABLE_AUTH=${ENABLE_AUTH:-false}
      - API_AUTH_TOKEN=${API_AUTH_TOKEN:-}
      - RATE_LIMIT_PER_MINUTE=${RATE_LIMIT_PER_MINUTE:-1200}
      - CORS_ALLOW_ORIGINS=${CORS_ALLOW_ORIGINS:-*}
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
      - ENVIRONMENT=production
    depends_on:
      mongo:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/v1/healthz"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_BOT_URL: ${NEXT_PUBLIC_BOT_URL:-http://localhost:8080}
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_BOT_URL=${NEXT_PUBLIC_BOT_URL:-http://localhost:8080}
    depends_on:
      - backend

volumes:
  mongo_data:
